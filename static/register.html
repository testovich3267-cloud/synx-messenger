<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Synx — Регистрация</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="auth-body">

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">Synx</div>

        <h2>Регистрация</h2>

        <input id="regUsername" class="auth-input" type="text" placeholder="Логин">
        <input id="regPassword" class="auth-input" type="password" placeholder="Пароль">

        <button class="auth-btn" id="regBtn">Создать аккаунт</button>

        <p class="auth-switch">
            Уже есть аккаунт? <a href="/static/login.html">Войти</a>
        </p>

        <div id="authError" class="auth-error"></div>
    </div>
</div>

<script src="/static/auth.js"></script>
</body>
</html>
